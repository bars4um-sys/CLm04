<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сравнение Excel таблиц</title>
    <script src="xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .upload-box {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-box h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .file-input-label:hover {
            background: #764ba2;
        }

        .file-name {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
            word-break: break-word;
        }

        .file-name.loaded {
            color: #28a745;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .compare-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 200px;
        }

        .compare-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .compare-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #e0e0e0;
            color: #333;
        }

        .reset-btn:hover {
            background: #d0d0d0;
        }

        .results-section {
            display: none;
        }

        .results-section.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-header {
            background: #f8f9ff;
            padding: 20px;
            border-left: 4px solid #667eea;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .results-header h2 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .results-count {
            font-size: 14px;
            color: #666;
        }

        .differences-list {
            list-style: none;
        }

        .difference-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .company-name {
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .amounts {
            display: flex;
            gap: 30px;
            font-size: 14px;
        }

        .amount-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .amount-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 3px;
        }

        .amount-value {
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }

        .no-differences {
            padding: 30px;
            text-align: center;
            background: #d4edda;
            border-radius: 6px;
            color: #155724;
            font-weight: 600;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            padding: 15px;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            color: #721c24;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .upload-section {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .amounts {
                flex-direction: column;
                gap: 10px;
            }

            .difference-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .amounts {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Сравнение Excel таблиц</h1>

        <div class="error-message" id="errorMessage"></div>

        <div class="upload-section">
            <div class="upload-box">
                <h2>Таблица 1</h2>
                <div class="file-input-wrapper">
                    <input type="file" id="file1" accept=".xlsx,.xls,.csv" />
                    <label for="file1" class="file-input-label">📁 Загрузите таблицу 1</label>
                </div>
                <div class="file-name" id="fileName1"></div>
            </div>

            <div class="upload-box">
                <h2>Таблица 2</h2>
                <div class="file-input-wrapper">
                    <input type="file" id="file2" accept=".xlsx,.xls,.csv" />
                    <label for="file2" class="file-input-label">📁 Загрузите таблицу 2</label>
                </div>
                <div class="file-name" id="fileName2"></div>
            </div>
        </div>

        <div class="button-group">
            <button class="compare-btn" id="compareBtn" disabled>Сравнить таблицы</button>
            <button class="reset-btn" id="resetBtn">Очистить</button>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2>Результаты сравнения</h2>
                <div class="results-count" id="resultsCount"></div>
            </div>

            <div id="resultContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
